project:
  type: website
  output-dir: docs
  
date: last-modified
date-format: DD/MM/YYYY

website:
  title: "My Spatial World"
  description: "Spatial Analysis and Tutorials"

  sidebar:
    style: "docked"
    search: true
    collapse-level: 1
    contents:
      - section: Tutorials
        contents:
          - auto: "tutorials/*.qmd"

      - section: Projects
        contents:
          - auto: "projects/*.qmd"

      - about.qmd

format:
  html:
    theme:
      - materia
      - brand
    css: styles.css
    toc: true
    code-overflow: wrap
    code-fold: show
    lightbox: true

execute: 
  freeze: auto
  echo: true
  error: true
  warning: false
  







